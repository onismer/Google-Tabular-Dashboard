name: Deploy dashboard to GitHub Pages

# Publishes the prebuilt single-file dashboard (index.html at the repo root)
# to GitHub Pages. The build is self-contained, so CI only stages and deploys.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true        # auto-enable Pages if not already turned on

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
