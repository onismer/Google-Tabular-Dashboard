name: Deploy dashboard to GitHub Pages

# Publishes the prebuilt single-file dashboard (dist/) to GitHub Pages.
# The raw data workbooks are not required in CI — the build is already
# self-contained, so this workflow only stages and deploys the static file.

on:
  push:
    branches: [main]
    paths:
      - 'dist/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:        # allow manual runs from the Actions tab

# Permissions required by the official Pages deploy actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes supersede in-flight ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage site (serve dashboard at site root)
        run: |
          mkdir -p _site
          cp dist/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
